<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste Typography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontSize: {
              "heading-1": ["61px", { lineHeight: "1.2", letterSpacing: "0" }],
              "heading-2": ["49px", { lineHeight: "1.2", letterSpacing: "0" }],
              "heading-3": ["39px", { lineHeight: "1.2", letterSpacing: "0" }],
              "heading-4": ["31px", { lineHeight: "1.2", letterSpacing: "0" }],
              "heading-5": ["25px", { lineHeight: "1.2", letterSpacing: "0" }],
              "heading-6": ["20px", { lineHeight: "1.2", letterSpacing: "0" }],
              "body-1": ["16px", { lineHeight: "1.2", letterSpacing: "0" }],
              "body-2": ["13px", { lineHeight: "1.2", letterSpacing: "0" }],
              "caption-1": ["10px", { lineHeight: "1.2", letterSpacing: "0" }],
            },
          },
        },
      };
    </script>
  </head>
  <body class="p-8">
    <h1 class="text-heading-1 text-black mb-4">Heading 1 - 61px</h1>
    <h2 class="text-heading-2 text-black mb-4">Heading 2 - 49px</h2>
    <h3 class="text-heading-3 text-black mb-4">Heading 3 - 39px</h3>
    <h4 class="text-heading-4 text-black mb-4">Heading 4 - 31px</h4>
    <h5 class="text-heading-5 text-black mb-4">Heading 5 - 25px</h5>
    <h6 class="text-heading-6 text-black mb-4">Heading 6 - 20px</h6>
    <p class="text-body-1 text-black mb-4">Body 1 - 16px</p>
    <p class="text-body-2 text-black mb-4">Body 2 - 13px</p>
    <p class="text-caption-1 text-black mb-4">Caption 1 - 10px</p>
  </body>
</html>
